name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      ########################################################################
      # 1. CHECKOUT
      ########################################################################
      - name: Checkout
        uses: actions/checkout@v4

      ########################################################################
      # 2. VERSION LOCK
      ########################################################################
      - name: Set Version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$VERSION" > files/version
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      ########################################################################
      # 3. CHECKSUM (fully deterministic)
      ########################################################################
      - name: Generate checksum
        run: |
          cd files
          rm -f checksums.sha256

          find luci view -type f | sort | while read f; do
            sha256sum "$f" >> checksums.sha256
          done

      ########################################################################
      # 4. DELTA MAP (simple upgrade engine)
      ########################################################################
      - name: Generate delta map
        run: |
          cat > files/delta.map <<EOF
menu.json=UPDATE
acl.json=UPDATE
dashboard.js=UPDATE
EOF

      ########################################################################
      # 5. MANIFEST (NO HEREDOC JSON SAFETY VERSION)
      ########################################################################
      - name: Generate manifest
        run: |
          printf '{
  "id": "luci-app-adguardhome-dashboard",
  "version": "%s",
  "title": "AdGuardHome Dashboard",
  "architecture": "all"
}
' "$VERSION" > manifest.json

      ########################################################################
      # 6. INDEX FEED (safe printf, no YAML risk)
      ########################################################################
      - name: Generate index feed
        run: |
          printf '{
  "id": "luci-app-adguardhome-dashboard",
  "version": "%s",
  "manifest": "manifest.json",
  "download": "https://github.com/%s/releases/download/v%s/luci-app-adguardhome-dashboard.zip"
}
' "$VERSION" "${GITHUB_REPOSITORY}" "$VERSION" > files/index.json

      ########################################################################
      # 7. VERIFY (fail-fast integrity check)
      ########################################################################
      - name: Verify checksum
        run: |
          cd files
          sha256sum -c checksums.sha256

      ########################################################################
      # 8. PACKAGE (fixed structure release bundle)
      ########################################################################
      - name: Build package
        run: |
          rm -rf release
          mkdir -p release

          cp -r files release/
          cp manifest.json release/
          cp README.md release/

          cd release
          zip -r luci-app-adguardhome-dashboard.zip .

      ########################################################################
      # 9. RELEASE (idempotent safe publish)
      ########################################################################
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: release/luci-app-adguardhome-dashboard.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}