name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Version
        run: echo "${GITHUB_REF_NAME#v}" > files/version

      - name: Checksum
        run: |
          cd files
          rm -f checksums.sha256
          for f in luci/*.json view/*.js; do
            [ -f "$f" ] && sha256sum "$f" >> checksums.sha256
          done

      - name: Delta
        run: |
          cat > files/delta.map <<EOF
menu.json=UPDATE
acl.json=UPDATE
dashboard.js=UPDATE
EOF

      - name: Manifest
        run: |
          echo "{\"id\":\"luci-app-adguardhome-dashboard\",\"version\":\"${GITHUB_REF_NAME#v}\"}" > manifest.json

      - name: Verify
        run: cd files && sha256sum -c checksums.sha256

      - name: Package
        run: |
          mkdir release
          cp -r files release/
          cp manifest.json release/
          cp README.md release/
          cd release
          zip -r package.zip .

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/package.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
