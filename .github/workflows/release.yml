name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:

      ########################################################################
      # 1. Checkout
      ########################################################################
      - name: Checkout
        uses: actions/checkout@v4

      ########################################################################
      # 2. Version System
      ########################################################################
      - name: Set Version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$VERSION" > files/version
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      ########################################################################
      # 3. Deterministic checksum (source integrity)
      ########################################################################
      - name: Generate checksum
        run: |
          cd files
          rm -f checksums.sha256

          find luci view -type f | sort | while read f; do
            sha256sum "$f" >> checksums.sha256
          done

      ########################################################################
      # 4. Delta system (real diff tracking)
      ########################################################################
      - name: Generate delta map
        run: |
          cd files

          if [ -f old_checksums.sha256 ]; then
            OLD=$(cat old_checksums.sha256)
          else
            OLD=""
          fi

          > delta.map

          while read line; do
            file=$(echo "$line" | awk '{print $2}')

            if ! echo "$OLD" | grep -q "$file"; then
              echo "$file=UPDATE" >> delta.map
            fi
          done < checksums.sha256

          cp checksums.sha256 old_checksums.sha256

      ########################################################################
      # 5. Manifest (jq structured safe generation)
      ########################################################################
      - name: Generate manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          jq -n \
            --arg id "luci-app-adguardhome-dashboard" \
            --arg ver "$VERSION" \
            '{
              id: $id,
              version: $ver,
              type: "luci-app",
              min_fw: "21",
              update_strategy: "delta"
            }' > manifest.json

      ########################################################################
      # 6. Feed index (software repo core)
      ########################################################################
      - name: Generate feed index
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          jq -n \
            --arg id "luci-app-adguardhome-dashboard" \
            --arg ver "$VERSION" \
            --arg repo "$GITHUB_REPOSITORY" \
            '{
              id: $id,
              version: $ver,
              manifest: "manifest.json",
              download: ("https://github.com/" + $repo + "/releases/download/v" + $ver + "/luci-app-adguardhome-dashboard.zip"),
              updated_at: now
            }' > files/index.json

      ########################################################################
      # 7. Verify integrity (fail fast build)
      ########################################################################
      - name: Verify checksum
        run: |
          cd files
          sha256sum -c checksums.sha256

      ########################################################################
      # 8. Package release (immutable artifact)
      ########################################################################
      - name: Build package
        run: |
          rm -rf release
          mkdir -p release

          cp -r files release/
          cp manifest.json release/
          cp README.md release/

          cd release
          zip -r luci-app-adguardhome-dashboard.zip .

      ########################################################################
      # 9. Publish release (idempotent safe publish)
      ########################################################################
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: release/luci-app-adguardhome-dashboard.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}