name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      ########################################################################
      # 1. VERSION LOCK（防重复 tag / 防污染）
      ########################################################################
      - name: Set Version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$VERSION" > files/version
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      ########################################################################
      # 2. CHECKSUM GENERATION（严格一致性）
      ########################################################################
      - name: Generate checksum
        run: |
          cd files
          rm -f checksums.sha256

          find luci view -type f | sort | while read f; do
            sha256sum "$f" >> checksums.sha256
          done

      ########################################################################
      # 3. DELTA MAP（未来扩展 diff upgrade）
      ########################################################################
      - name: Generate delta map
        run: |
          cat > files/delta.map <<EOF
menu.json=UPDATE
acl.json=UPDATE
dashboard.js=UPDATE
EOF

      ########################################################################
      # 4. MANIFEST（统一版本源）
      ########################################################################
      - name: Generate manifest
        run: |
          cat > manifest.json <<EOF
{
  "id": "luci-app-adguardhome-dashboard",
  "version": "${VERSION}",
  "title": "AdGuardHome Dashboard",
  "architecture": "all"
}
EOF

      ########################################################################
      # 5. INDEX FEED（v2.2/v3 核心）
      ########################################################################
      - name: Generate index feed
        run: |
          cat > files/index.json <<EOF
{
  "id": "luci-app-adguardhome-dashboard",
  "version": "${VERSION}",
  "manifest": "manifest.json",
  "download": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/luci-app-adguardhome-dashboard.zip"
}
EOF

      ########################################################################
      # 6. VERIFY (fail fast)
      ########################################################################
      - name: Verify checksum
        run: |
          cd files
          sha256sum -c checksums.sha256

      ########################################################################
      # 7. PACKAGE (固定结构)
      ########################################################################
      - name: Build package
        run: |
          mkdir -p release

          cp -r files release/
          cp manifest.json release/
          cp README.md release/

          cd release
          zip -r luci-app-adguardhome-dashboard.zip .

      ########################################################################
      # 8. RELEASE (idempotent safe publish)
      ########################################################################
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: release/luci-app-adguardhome-dashboard.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}