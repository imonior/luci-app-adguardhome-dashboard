name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      ########################################################################
      # Version
      ########################################################################
      - name: Set Version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$VERSION" > files/version
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      ########################################################################
      # Checksums
      ########################################################################
      - name: Generate checksum
        run: |
          cd files
          rm -f checksums.sha256
          find luci view -type f | sort | while read f; do
            sha256sum "$f" >> checksums.sha256
          done

      ########################################################################
      # Delta map (SAFE MODE - no heredoc, no jq)
      ########################################################################
      - name: Generate delta map
        run: |
          cd files

          > delta.map

          while read line; do
            file=$(echo "$line" | awk '{print $2}')
            echo "$file=UPDATE" >> delta.map
          done < checksums.sha256

      ########################################################################
      # Manifest (YAML SAFE JSON - NO jq multiline)
      ########################################################################
      - name: Generate manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          printf '{"id":"luci-app-adguardhome-dashboard","version":"%s","type":"luci-app","min_fw":"21","update_strategy":"delta"}\n' "$VERSION" > manifest.json

      ########################################################################
      # Feed index (YAML SAFE JSON)
      ########################################################################
      - name: Generate feed index
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          printf '{"id":"luci-app-adguardhome-dashboard","version":"%s","manifest":"manifest.json","download":"https://github.com/%s/releases/download/v%s/luci-app-adguardhome-dashboard.zip"}\n' \
          "$VERSION" "$GITHUB_REPOSITORY" "$VERSION" > files/index.json

      ########################################################################
      # Verify checksum
      ########################################################################
      - name: Verify checksum
        run: |
          cd files
          sha256sum -c checksums.sha256

      ########################################################################
      # Package
      ########################################################################
      - name: Build package
        run: |
          rm -rf release
          mkdir -p release

          cp -r files release/
          cp manifest.json release/
          cp README.md release/

          cd release
          zip -r luci-app-adguardhome-dashboard.zip .

      ########################################################################
      # Release
      ########################################################################
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: release/luci-app-adguardhome-dashboard.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
