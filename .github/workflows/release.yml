name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Version
        run: echo "${GITHUB_REF_NAME#v}" > files/version

      - name: Checksum
        run: |
          cd files
          rm -f checksums.sha256
          for f in luci/* view/*; do
            test -f "$f" && sha256sum "$f" >> checksums.sha256
          done

      - name: Delta
        run: |
          cd files
          echo "menu.json=UPDATE" > delta.map
          echo "acl.json=UPDATE" >> delta.map
          echo "dashboard.js=UPDATE" >> delta.map

      - name: Manifest
        run: |
          v="${GITHUB_REF_NAME#v}"
          echo "{\"id\":\"luci-app-adguardhome-dashboard\",\"version\":\"$v\"}" > manifest.json

      - name: Index
        run: |
          v="${GITHUB_REF_NAME#v}"
          echo "{\"id\":\"luci-app-adguardhome-dashboard\",\"version\":\"$v\"}" > files/index.json

      - name: Verify
        run: |
          cd files
          sha256sum -c checksums.sha256

      - name: Package
        run: |
          rm -rf release
          mkdir release
          cp -r files release/
          cp manifest.json release/
          cp README.md release/
          cd release
          zip -r package.zip .

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: release/package.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
